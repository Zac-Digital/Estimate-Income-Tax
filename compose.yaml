services:
  estimate-income-tax:
    container_name: Estimate-Income-Tax
    build:
      context: .
      dockerfile: Dockerfile
    tmpfs:
      - /home/app/.aspnet/DataProtection-Keys
    restart: no
    expose:
      - "8080"
  
  ingress:
    container_name: Estimate-Income-Tax-Ingress
    image: caddy:2-alpine@sha256:c2af7d9004854180322ffd6f81b918874cee01f629084ab4d8ac0b96aa442432
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: no
    depends_on:
      - estimate-income-tax