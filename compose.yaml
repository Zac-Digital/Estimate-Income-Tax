services:
  estimate-income-tax:
    container_name: Estimate-Income-Tax
    build:
      context: .
      dockerfile: Dockerfile
    restart: no
    expose:
      - "8080"
  
  ingress:
    container_name: Estimate-Income-Tax-Ingress
    image: nginx:1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    restart: no
    depends_on:
      - estimate-income-tax