services:
  estimate-income-tax:
    container_name: Estimate-Income-Tax
    build:
      context: .
      dockerfile: Dockerfile
    tmpfs:
      - /home/app/.aspnet/DataProtection-Keys
    restart: no
    expose:
      - "8080"
  
  ingress:
    container_name: Estimate-Income-Tax-Ingress
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: no
    depends_on:
      - estimate-income-tax