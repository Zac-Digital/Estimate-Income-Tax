name: Functional Testing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'
  push:
    branches:
      - 'main'
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions: { }

jobs:
  build-and-test:
    name: Run Functional Test Suite | ${{ matrix.name }}
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ windows-2025, ubuntu-24.04 ]
        include:
          - name: "Windows"
            operating-system: windows-2025
          - name: "Linux"
            operating-system: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 'lts/Krypton'

      - name: Run Web Application
        shell: bash
        run: docker compose up -d

      - name: Install Playwright
        working-directory: ./test/IncomeTax.Presentation.Web.Functional
        shell: bash
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps
          
      - name: Determine Core Count
        id: core-count
        shell: bash
        run: |
          if [ command -v nproc > /dev/null ]; then
            CORES=$(nproc)
          elif [ -n $NUMBER_OF_PROCESSORS ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=1
          fi
          echo "CORES=$CORES" >> $GITHUB_OUTPUT

      - name: Run Functional Testing
        working-directory: ./test/IncomeTax.Presentation.Web.Functional
        shell: bash
        run: npx playwright test --workers ${{ steps.core-count.outputs.CORES }}

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: 'Playwright Report'
          path: './test/IncomeTax.Presentation.Web.Functional/playwright-report'
          compression-level: '9'
          if-no-files-found: 'ignore'