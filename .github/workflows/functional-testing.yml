name: Functional Testing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'src/IncomeTax.Presentation.Web.Node/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'compose-e2e.yaml'
  push:
    branches:
      - 'main'
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'src/IncomeTax.Presentation.Web.Node/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'compose-e2e.yaml'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions: { }

jobs:
  build-and-test:
    name: Build & Run Functional Test Suite
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Run Playwright Suite
        shell: bash
        run: |
          docker compose \
          --progress plain \
          -f compose.yaml \
          -f compose-e2e.yaml \
          up \
          --exit-code-from playwright

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: 'Playwright Report'
          path: './test/IncomeTax.Presentation.Web.Functional/playwright-report'
          compression-level: '9'
          if-no-files-found: 'ignore'