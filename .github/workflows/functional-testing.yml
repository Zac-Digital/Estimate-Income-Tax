name: Functional Testing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'
  push:
    branches:
      - 'main'
    paths:
      - 'src/IncomeTax.Presentation.Web/**'
      - 'test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/functional-testing.yml'
      - 'Dockerfile'
      - 'compose.yaml'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
  
permissions: {}

jobs:
  build-and-test:
    name: Build & Run Functional Test Suite
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 'lts/Krypton'

      - name: Run Web Application
        shell: bash
        run: docker compose up -d

      - name: Install Playwright
        working-directory: ./test/IncomeTax.Presentation.Web.Functional
        shell: bash
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps

      - name: Run Functional Testing
        working-directory: ./test/IncomeTax.Presentation.Web.Functional
        shell: bash
        run: npx playwright test --workers `nproc`

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: 'Playwright Report'
          path: './test/IncomeTax.Presentation.Web.Functional/playwright-report'
          compression-level: '9'
          if-no-files-found: 'ignore'