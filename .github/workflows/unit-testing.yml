name: Unit Testing

on:
  pull_request:
    paths: &push_paths
      - 'src/**'
      - '!src/IncomeTax.Presentation.Web.Node/**'
      - 'test/**'
      - '!test/IncomeTax.Presentation.Web.Functional/**'
      - '.github/workflows/unit-testing.yml'
  push:
    paths: *push_paths

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test Solution
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'ga'
          
      - name: .NET Restore
        shell: bash
        run: dotnet restore
        
      - name: .NET Build
        shell: bash
        run: dotnet build --no-restore --configuration Release
        
      - name: .NET Test
        shell: bash
        run: dotnet test --no-build --no-restore --configuration Release