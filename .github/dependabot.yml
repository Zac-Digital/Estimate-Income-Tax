version: 2

multi-ecosystem-groups: 
  playwright:
    schedule: 
      interval: "daily"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown: 
      default-days: 7
    groups:
      actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      nuget-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "src/IncomeTax.Presentation.Web.Node"
      - "test/IncomeTax.Presentation.Web.Functional"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@playwright/*"
      - dependency-name: "@axe-core/*"
    groups:
      npm-deps:
        patterns:
          - "*"
        
  - package-ecosystem: "npm"
    directories:
      - "src/IncomeTax.Presentation.Web.Node"
      - "test/IncomeTax.Presentation.Web.Functional"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    multi-ecosystem-group: playwright
    groups:
      playwright-deps:
        patterns:
          - "@playwright/*"
          - "@axe-core/*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotnet/aspnet"
        update-types: ["version-update:semver-major"]
      - dependency-name: "playwright"
    groups:
      docker-deps:
        patterns:
          - "*"
        
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    multi-ecosystem-group: playwright
    groups:
      playwright-deps:
        patterns:
          - "playwright"
        
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "caddy"
        update-types: ["version-update:semver-major"]
    groups:
      docker-compose-deps:
        patterns:
          - "*"
