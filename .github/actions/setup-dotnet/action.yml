name: Setup .NET

runs:
  using: composite
  steps:
    - name: Install .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.x'
        dotnet-quality: 'ga'

    - name: .NET Restore
      shell: bash
      run: dotnet restore

    - name: .NET Build
      shell: bash
      run: dotnet build --no-restore --configuration Release